<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TimeBlockrr</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- SVG Filters for Color Blindness Simulation -->
    <svg class="color-blind-filters" aria-hidden="true">
      <defs>
        <filter id="deuteranopia">
          <feColorMatrix type="matrix" values="0.43 0.72 -0.15 0 0 0.34 0.57 0.09 0 0 -0.02 0.04 0.98 0 0 0 0 0 1 0"/>
        </filter>
        <filter id="protanopia">
          <feColorMatrix type="matrix" values="0.57 0.43 0 0 0 0.56 0.44 0 0 0 0.24 0.76 0 0 0 0 0 0 1 0"/>
        </filter>
        <filter id="tritanopia">
          <feColorMatrix type="matrix" values="0.95 0.05 0 0 0 0 0.43 0.57 0 0 0 0.48 0.52 0 0 0 0 0 1 0"/>
        </filter>
      </defs>
    </svg>
  </body>
</html>
